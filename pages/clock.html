<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="apple-touch-icon" sizes="180x180" href="../favicon/apple-touch-icon-2.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon/favicon-32x32-2.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../favicon/favicon-16x16-2.png">
  <link rel="manifest" href="../favicon/site.webmanifest">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/main-n-header.css">
  <link rel="stylesheet" href="../css/clock.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#151515">
  <title>Routine assistant | Clock</title>
</head>

<body class="body">
  <div class="wrapper">
    <div class="header">
      <div class="container">
        <div class="header__inner">
          <div class="header__logo">
            <a href="../index.html">Routine assistant</a>
          </div>

          <nav class="nav">
            <ul class="nav__list">
              <li class="nav__item">
                <a href="../index.html" class="nav__link">Home</a>
              </li>
              <li class="nav__item">
                <a href="todolist.html" class="nav__link">To-Do List</a>
              </li>
              <li class="nav__item">
                <a href="notes.html" class="nav__link">Notes</a>
              </li>
              <li class="nav__item">
                <a href="#" class="nav__link nav__link--current">Alarms</a>
              </li>
              <li class="nav__item">
                <a href="clicker.html" class="nav__link">Clicker</a>
              </li>
            </ul>
          </nav>
          <div class="burger-menu">
            <span></span>
          </div>
        </div>
      </div>
    </div>

    <main class="main">
      <div class="container">
        <div class="clock__inner">
          <div class="clock__header">
            <div class="clock__header-inner">
              <div class="clock__title">Alarms</div>
              <ul class="clock__controls">
                <li class="clock__controls-item">
                  <button class="clock__controls-button clock__controls-button--alarms clock__controls-button--active">Alarms</button>
                </li>
                <li class="clock__controls-item">
                  <button class="clock__controls-button clock__controls-button--timers">Timer</button>
                </li>
              </ul>
            </div>
          </div>
          <div class="clock__content clock__content--alarms clock__content--active">
            <div class="clock__content-alarms ">
              <div class="alarm-clock">00:00</div>
              <ul class="alarm-list">
              </ul>
            </div>
            <div class="controls">
              <button class="controls__button controls__button--add">+</button>
              <button class="controls__button controls__button--delete">-</button>
            </div>
          </div>
          <div class="clock__content clock__content--timers">
            <ul class="clock__content-timers">
              
            </ul>
            <div class="controls">
              <button class="controls__button ">+</button>
              <button class="controls__button ">-</button>
            </div>
          </div>
        </div>
      </div>
    </main>


    <footer class="footer">
      <div class="container">
        <div class="footer__inner">
          <ul class="footer__list">
            <li class="footer__item">
              <a href="https://github.com/Pavels-Lavrinovics" class="footer__link" target="_blank">
                <img src="../img/icons/git.svg" alt="link to my github" class="footer__icon">
              </a>
            </li>
            <li class="footer__item">
              <a href="https://www.linkedin.com/in/pavels-lavrinovics" class="footer__link"
                target="_blank">
                <img src="../img/icons/linkedin-logo.svg" alt="link to my linked in" class="footer__icon">
              </a>
            </li>
            <li class="footer__item footer__item--long">
              <p class="footer__text">
                Design & Code by: P. Lavrinovics
              </p>
            </li>
          </ul>
        </div>
      </div>
    </footer>
  </div>

  <div class="modal">
    <div class="container">
      <div class="modal__inner">
        <div class="modal__window">
          <div class="modal__window-header">Set alarm</div>
          <div class="modal__window-content">
            <input type="time" value="08:00" placeholder="Alarm time" class="modal__window-input modal__window-input--time">
            <input type="text" placeholder="Alarm description" class="modal__window-input modal__window-input--description">
          </div>
          <button class="modal__save-btn">Save</button>
          <button class="modal__close-btn"><span>+</span></button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/burger.js"></script>
  <script src="../js/clock.js"></script>
</body>

</html>
